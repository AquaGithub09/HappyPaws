<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Paws Bacolod</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="../src/css/dashboard.css">

</head>
<body>

<!-- DEFAULT NAVIGATION BAR -->
<nav class="navbar shadow-sm sticky-top">
  <div class="container-fluid">

    <div class="d-flex align-items-center w-100">

      <button class="btn d-lg-none"
              data-bs-toggle="offcanvas"
              data-bs-target="#menu">
        <i class="bi bi-list fs-3"></i>
      </button>

      <a class="navbar-brand ms-2">🐾 Happy Paws</a>

      <div class="d-none d-lg-block flex-grow-1 mx-4">
        <input id="search"
               class="form-control rounded-pill"
               placeholder="Looking for something?">
      </div>

      <div class="d-none d-lg-flex gap-3 align-items-center">

        <button class="btn icon-btn">
          <i class="bi bi-bell" data-bs-toggle="offcanvas" data-bs-target="#offcanvasRightnotification" aria-controls="offcanvasRight"></i>
        </button>
        
        <button class="btn icon-btn">
          <a href="profile.html" class="text-dark"> <i class="bi bi-person"></i> </a>
        </button>


      </div>

    </div>

  </div>
</nav>

<!-- HAMBURGER MENU -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="menu">

  <div class="offcanvas-header">
    <h5 class="fw-bold">🐾 Happy Paws</h5>
    <button class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>

  <div class="offcanvas-body">

    <div class="mb-4">
      <input id="mobileSearch"
             class="form-control rounded-pill"
             placeholder="Looking for something?">
    </div>

    <div class="list-group list-group-flush">

      <a class="list-group-item border-0">
        <i class="bi bi-search-heart me-2"></i>Adopt Pets
      </a>

      <a class="list-group-item border-0" data-bs-toggle="offcanvas" data-bs-target="#offcanvasRightlikes" aria-controls="offcanvasRight">
        <i class="bi bi-heart me-2"></i>Likes
      </a

      <a class="list-group-item border-0">
        <i class="bi bi-file-earmark-text me-2"></i>Applications
      </a>
      
    </div>

    <hr>

    <div class="list-group list-group-flush">

      <a class="list-group-item border-0" data-bs-toggle="offcanvas" data-bs-target="#offcanvasRightnotification" aria-controls="offcanvasRight">
        <i class="bi bi-bell me-2"></i>Notifications
      </a>
      <a href="profile.html" class="list-group-item border-0">
        <i class="bi bi-person me-2"></i>Profile
      </a>

      <a href="..../index.html" class="list-group-item border-0">
        <i class="bi bi-file-earmark-text me-2"></i>Logout
      </a>

    </div>

  </div>
</div>

<!-- VERTICAL MENU -->
<div class="container-fluid p-3">
  <div class="row g-3 dashboard">

    <div class="col-lg-3 d-none d-lg-block sidebar">
      <div class="card shadow-sm h-100 p-3">

        <h5 class="fw-bold mb-4">Navigation</h5>

        <div class="list-group list-group-flush">


          <a class="list-group-item border-0">
            <i class="bi bi-search-heart me-2"></i>Adopt Pets
          </a>

          <a class="list-group-item border-0" data-bs-toggle="offcanvas" data-bs-target="#offcanvasRightlikes" aria-controls="offcanvasRight">
            <i class="bi bi-heart me-2"></i>Likes
          </a>

          <a class="list-group-item border-0">
            <i class="bi bi-file-earmark-text me-2"></i>Applications
          </a>
          
          <a class="list-group-item border-0">
            <i class="bi bi-box-arrow-right me-2"></i>Logout
          </a>

        </div>

      </div>
    </div>

<!-- PET CONTAINER -->
    <div class="col-12 col-lg-9 feed">

      <div class="card shadow-sm mb-3">
  <div class="card-body">
  
<form action="" method="post" enctype="multipart/form-data">

    <div class="d-flex align-items-start gap-3">

        <img
            src="https://placehold.co/50"
            class="rounded-circle flex-shrink-0"
            width="50"
            height="50"       
            alt="Profile">

        <div class="flex-grow-1">

    <!-- Input + Send Button -->
    <div class="d-flex align-items-center gap-2">

        <input
            type="text"
            class="form-control rounded-pill bg-light border-0 py-2"
            placeholder="What's on your mind?">

        <button
            type="submit"
            class="btn  d-flex align-items-center justify-content-center"
            style="width:50px;height:50px;">

            <i class="bi bi-send"></i>

        </button>

    </div>

    <!-- Preview Grid -->
    <div id="previewContainer" class="preview-grid mt-3"></div>

</div>
    </div>

    <hr>

    <div class="row text-center">

        <div class="col-6">

            <input
                type="file"
                id="photoUpload"
                accept="image/jpeg,image/jpg,image/webp,image/gif"
                multiple
                hidden>

            <label
                for="photoUpload"
                class="btn w-100">

                <i class="bi bi-image text-success"></i>
                Photos

            </label>

        </div>

        <div class="col-6">

            <input
                type="file"
                id="videoUpload"
                accept="video/*"
                multiple
                hidden>

            <label
                for="videoUpload"
                class="btn w-100">

                <i class="bi bi-camera-video text-danger"></i>
                Videos

            </label>

        </div>

    </div>

</form>
  </div>
</div>

      <div class="card pet-card shadow-sm mb-3">
        <img src="${p.img}" class="card-img-top">
        <div class="card-body">
          <h5>Luna</h5>
          <p class="text-muted">Sweet rescued kitten looking for a forever hom</p>
          <button class="btn btn-sm px-3 btn-outline-danger"><i class="bi bi-heart-fill"></i></button>
          <button class="btn btn-sm px-3 btn-outline-secondary"><i class="bi bi-chat-fill"></i></button>
          <button class="btn btn-sm px-3 btn-outline-success" data-bs-toggle="modal" data-bs-target="#adoptModal"><i class="bi bi-file-earmark-check-fill"></i></button>
        </div>
      </div>

    </div>


  </div>
</div>

<!-- APPLICATION FORM FOR ADOPTION -->
<div class="modal fade" id="adoptModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4">
      <div class="modal-body p-4">
        <h4>Screening Application Form 🐾</h4>
        <input class="form-control my-2" placeholder="Full Name">
        <input class="form-control my-2" placeholder="Email">
        <textarea class="form-control my-2" placeholder="Why do you want to adopt?"></textarea>
        <button class="btn btn-primary w-100">Submit Application</button>
      </div>
    </div>
  </div>
</div>

<!-- Notifiation offcanvas -->

<!-- Likes -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasRightlikes" aria-labelledby="offcanvasRightLabel">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="offcanvasRightLabel">Likes</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body">
    ...
  </div>
</div>

<!-- notification -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasRightnotification" aria-labelledby="offcanvasRightLabel">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="offcanvasRightLabel">Notification</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body">
    ...
  </div>
</div


<script src="../src/js/dashboard/preview_Image.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
